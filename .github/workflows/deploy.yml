name: Deploy to Sakura

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-sakura
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Deploy to Sakura via SFTP (lftp mirror)
        env:
          SFTP_SERVER: ${{ secrets.FTP_SERVER }}
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SFTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "$SFTP_USER","$SFTP_PASS" "sftp://$SFTP_SERVER:22" <<'EOF'
          set sftp:auto-confirm yes
          set net:max-retries 2
          set net:timeout 20
          mirror -R --delete --verbose \
            -X '.git*' \
            -X '*.md' \
            -X '.nojekyll' \
            -X '.well-known' \
            ./ /home/kkkblog/www/juasa-relations/
          bye
          EOF
