name: Deploy to Sakura

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-sakura
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Sakura via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          server-dir: /home/kkkblog/www/juasa-relations/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/README.md
            **/.nojekyll
